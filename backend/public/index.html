<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MileLog</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
      --border: #2a2a2a; --accent: #c8f461; --accent2: #4fffb0;
      --text: #f0f0f0; --muted: #666; --danger: #ff4f4f; --radius: 12px;
    }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ---- AUTH ---- */
    .auth-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .auth-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
      padding: 40px 32px; width: 100%; max-width: 400px;
    }
    .auth-logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
    .auth-logo span { color: var(--accent); }
    .auth-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 28px; background: var(--surface2); border-radius: 8px; padding: 4px; }
    .auth-tab {
      flex: 1; padding: 8px; text-align: center; font-size: 13px; font-weight: 700;
      border-radius: 6px; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'Syne', sans-serif;
      transition: all .2s;
    }
    .auth-tab.active { background: var(--accent); color: #0e0e0e; }

    /* ---- SHARED FORM ---- */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
    input[type="text"], input[type="email"], input[type="password"], input[type="date"], select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; color: var(--text);
      font-family: 'DM Mono', monospace; font-size: 14px; outline: none; transition: border-color .2s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 8px;
      font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all .2s; letter-spacing: 0.5px;
    }
    .btn-primary { background: var(--accent); color: #0e0e0e; }
    .btn-primary:hover { background: #d4ff70; transform: translateY(-1px); }
    .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .err { font-size: 12px; color: var(--danger); margin-top: 8px; font-family: 'DM Mono', monospace; min-height: 18px; }

    /* ---- APP SHELL ---- */
    .app { display: none; flex-direction: column; min-height: 100vh; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      background: var(--surface); position: sticky; top: 0; z-index: 10;
    }
    .topbar-logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
    .topbar-logo span { color: var(--accent); }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .user-name { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .logout-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
      padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all .2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* ---- TABS ---- */
    .tabs {
      display: flex; gap: 0; padding: 0 20px;
      border-bottom: 1px solid var(--border); background: var(--surface);
    }
    .tab {
      padding: 14px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
      border: none; background: none; color: var(--muted); font-family: 'Syne', sans-serif;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ---- CONTENT ---- */
    .content { padding: 20px; max-width: 700px; margin: 0 auto; width: 100%; flex: 1; }
    .page { display: none; }
    .page.active { display: block; }

    /* ---- STATS ---- */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; }
    .stat-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--accent); }
    .stat-value.green { color: var(--accent2); }

    /* ---- CARD ---- */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .card-title { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }

    /* ---- HMRC TOGGLE ---- */
    .hmrc-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .hmrc-label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
    .toggle-switch { position: relative; width: 40px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; transition: .3s; cursor: pointer; }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: var(--muted); border-radius: 50%; transition: .3s; }
    input:checked + .toggle-slider { background: var(--accent); }
    input:checked + .toggle-slider::before { transform: translateX(18px); background: #0e0e0e; }

    /* ---- TRIP FORM ---- */
    .purpose-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .hmrc-note { font-size: 11px; color: var(--muted); margin-top: 8px; font-family: 'DM Mono', monospace; }

    /* ---- FILTERS ---- */
    .filter-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 16px; }
    .filter-row .btn { width: auto; padding: 12px 16px; font-size: 13px; }
    .quick-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .qf-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
      padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: all .2s;
    }
    .qf-btn:hover, .qf-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,244,97,0.08); }

    /* ---- TRIPS LIST ---- */
    .trips-list { display: flex; flex-direction: column; gap: 10px; }
    .trip-item {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; display: flex; align-items: center; gap: 14px;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform: translateY(0); } }
    .trip-icon { width: 36px; height: 36px; background: var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .trip-details { flex: 1; min-width: 0; }
    .trip-route { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .trip-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
    .trip-right { text-align: right; flex-shrink: 0; }
    .trip-miles { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--accent); }
    .trip-hmrc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent2); margin-top: 2px; }
    .trip-delete { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: color .2s; flex-shrink: 0; }
    .trip-delete:hover { color: var(--danger); }

    /* ---- EMPTY / LOADING ---- */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .loading { text-align: center; padding: 30px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }

    /* ---- EXPORT ---- */
    .export-btn { background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: all .2s; }
    .export-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ---- SUMMARY ---- */
    .month-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 12px; }
    .month-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .month-name { font-size: 15px; font-weight: 700; }
    .month-trips { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .month-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .month-stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px; }
    .month-stat-value { font-family: 'DM Mono', monospace; font-size: 15px; color: var(--accent); font-weight: 500; }
    .month-stat-value.green { color: var(--accent2); }

    /* ---- CALCULATING ---- */
    .calc-msg { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; padding: 8px 0; display: none; }
  </style>
</head>
<body>

<!-- AUTH -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-box">
    <div class="auth-logo">Mile<span>Log</span></div>
    <div class="auth-subtitle">Track every mile. Claim every penny.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuth('login')">Sign In</button>
      <button class="auth-tab" onclick="switchAuth('register')">Register</button>
    </div>

    <!-- Login -->
    <div id="loginForm">
      <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"/></div>
      <div class="err" id="loginErr"></div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="login()">Sign In</button>
    </div>

    <!-- Register -->
    <div id="registerForm" style="display:none">
      <div class="form-group"><label>Full Name</label><input type="text" id="regName" placeholder="Carl Smith"/></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="you@example.com"/></div>
      <div class="form-group"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters"/></div>
      <div class="err" id="regErr"></div>
      <button class="btn btn-primary" style="margin-top:12px" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app" id="appWrap">
  <div class="topbar">
    <div class="topbar-logo">Mile<span>Log</span></div>
    <div class="topbar-right">
      <span class="user-name" id="userName"></span>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showPage('dashboard')">Dashboard</button>
    <button class="tab" onclick="showPage('trips')">Trips</button>
    <button class="tab" onclick="showPage('summary')">Summary</button>
  </div>

  <div class="content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Total Miles</div><div class="stat-value" id="sTotalMiles">—</div></div>
        <div class="stat-card" id="sHmrcCard"><div class="stat-label">HMRC Value</div><div class="stat-value green" id="sHmrcVal">—</div></div>
        <div class="stat-card"><div class="stat-label">Total Trips</div><div class="stat-value" id="sTotalTrips">—</div></div>
        <div class="stat-card"><div class="stat-label">This Month</div><div class="stat-value" id="sThisMonth">—</div></div>
      </div>

      <div class="card">
        <div class="hmrc-row">
          <div class="hmrc-label">
            HMRC Calculations
            <label class="toggle-switch">
              <input type="checkbox" id="hmrcToggle" onchange="toggleHMRC()"/>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="card-title">Log a Trip</div>

        <div class="form-group"><label>Date</label><input type="date" id="tripDate"/></div>
        <div class="form-group"><label>From</label><input type="text" id="fromAddr" placeholder="Start address or postcode"/></div>
        <div class="form-group"><label>To</label><input type="text" id="toAddr" placeholder="End address or postcode"/></div>
        <div class="purpose-row">
          <div class="form-group"><label>Purpose (optional)</label><input type="text" id="tripPurpose" placeholder="e.g. Site visit"/></div>
          <div class="form-group"><label>Type</label>
            <select id="tripType">
              <option value="business">Business</option>
              <option value="personal">Personal</option>
            </select>
          </div>
        </div>

        <div class="calc-msg" id="calcMsg">⏳ Calculating route...</div>
        <div class="err" id="tripErr"></div>
        <button class="btn btn-primary" id="addBtn" onclick="addTrip()">Calculate & Log Trip</button>
        <div class="hmrc-note" id="hmrcNote" style="display:none">45p/mile (first 10,000 mi) · 25p/mile thereafter</div>
      </div>
    </div>

    <!-- TRIPS -->
    <div class="page" id="page-trips">
      <div class="card">
        <div class="card-title" style="margin-bottom:14px">Filter Trips</div>
        <div class="quick-filters">
          <button class="qf-btn active" onclick="quickFilter('all', this)">All time</button>
          <button class="qf-btn" onclick="quickFilter('thismonth', this)">This month</button>
          <button class="qf-btn" onclick="quickFilter('lastmonth', this)">Last month</button>
          <button class="qf-btn" onclick="quickFilter('thisyear', this)">This year</button>
          <button class="qf-btn" onclick="quickFilter('custom', this)">Custom</button>
        </div>
        <div id="customDateRange" style="display:none">
          <div class="filter-row">
            <div class="form-group" style="margin:0"><label>From</label><input type="date" id="filterFrom"/></div>
            <div class="form-group" style="margin:0"><label>To</label><input type="date" id="filterTo"/></div>
            <button class="btn btn-outline" onclick="applyFilter()">Apply</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin:0">Trips</div>
          <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
        </div>
        <div id="tripsList"><div class="loading">Loading trips...</div></div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="page" id="page-summary">
      <div class="card">
        <div class="card-title">Monthly Summary</div>
        <div id="summaryList"><div class="loading">Loading...</div></div>
      </div>
    </div>

  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('milelog_token');
let currentUser = JSON.parse(localStorage.getItem('milelog_user') || 'null');
let hmrcEnabled = JSON.parse(localStorage.getItem('milelog_hmrc') || 'false');
let allTrips = [];
let activeFilter = { from: null, to: null };

// ---- INIT ----
if (token && currentUser) showApp();
else showAuth();

function showAuth() {
  document.getElementById('authWrap').style.display = 'flex';
  document.getElementById('appWrap').style.display = 'none';
}

function showApp() {
  document.getElementById('authWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'flex';
  document.getElementById('userName').textContent = currentUser?.name || '';
  document.getElementById('tripDate').value = today();
  document.getElementById('hmrcToggle').checked = hmrcEnabled;
  document.getElementById('hmrcNote').style.display = hmrcEnabled ? 'block' : 'none';
  document.getElementById('sHmrcCard').style.display = hmrcEnabled ? 'block' : 'none';
  loadTrips();
  loadSummary();
}

// ---- AUTH ----
function switchAuth(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}

async function login() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  document.getElementById('loginErr').textContent = '';
  if (!email || !password) { document.getElementById('loginErr').textContent = 'Please fill in all fields'; return; }
  try {
    const res = await api('/api/auth/login', 'POST', { email, password });
    token = res.token; currentUser = res.user;
    localStorage.setItem('milelog_token', token);
    localStorage.setItem('milelog_user', JSON.stringify(currentUser));
    showApp();
  } catch (e) { document.getElementById('loginErr').textContent = e.message; }
}

async function register() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  document.getElementById('regErr').textContent = '';
  if (!name || !email || !password) { document.getElementById('regErr').textContent = 'Please fill in all fields'; return; }
  try {
    const res = await api('/api/auth/register', 'POST', { name, email, password });
    token = res.token; currentUser = res.user;
    localStorage.setItem('milelog_token', token);
    localStorage.setItem('milelog_user', JSON.stringify(currentUser));
    showApp();
  } catch (e) { document.getElementById('regErr').textContent = e.message; }
}

function logout() {
  token = null; currentUser = null;
  localStorage.removeItem('milelog_token');
  localStorage.removeItem('milelog_user');
  showAuth();
}

// ---- HMRC ----
function toggleHMRC() {
  hmrcEnabled = document.getElementById('hmrcToggle').checked;
  localStorage.setItem('milelog_hmrc', JSON.stringify(hmrcEnabled));
  document.getElementById('hmrcNote').style.display = hmrcEnabled ? 'block' : 'none';
  document.getElementById('sHmrcCard').style.display = hmrcEnabled ? 'block' : 'none';
  renderTrips(allTrips);
  updateDashboardStats(allTrips);
}

// ---- TABS ----
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab')[['dashboard','trips','summary'].indexOf(name)].classList.add('active');
}

// ---- TRIPS ----
async function loadTrips() {
  try {
    let url = '/api/trips';
    const params = [];
    if (activeFilter.from) params.push('from=' + activeFilter.from);
    if (activeFilter.to) params.push('to=' + activeFilter.to);
    if (params.length) url += '?' + params.join('&');
    allTrips = await api(url);
    renderTrips(allTrips);
    updateDashboardStats(allTrips);
  } catch (e) { console.error(e); }
}

function renderTrips(trips) {
  const list = document.getElementById('tripsList');
  if (!trips.length) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🚗</div><p>No trips found.<br/>Log your first trip on the Dashboard.</p></div>`;
    return;
  }
  list.innerHTML = trips.map(t => `
    <div class="trip-item">
      <div class="trip-icon">${t.type === 'business' ? '💼' : '🏠'}</div>
      <div class="trip-details">
        <div class="trip-route">${t.from_address} → ${t.to_address}</div>
        <div class="trip-meta">${fmtDate(t.date)}${t.purpose ? ' · ' + t.purpose : ''}</div>
      </div>
      <div class="trip-right">
        <div class="trip-miles">${parseFloat(t.miles).toFixed(1)} mi</div>
        ${hmrcEnabled && t.type === 'business' ? `<div class="trip-hmrc">£${parseFloat(t.hmrc_value).toFixed(2)}</div>` : ''}
      </div>
      <button class="trip-delete" onclick="deleteTrip(${t.id})">✕</button>
    </div>
  `).join('');
}

function updateDashboardStats(trips) {
  const total = trips.reduce((s,t) => s + parseFloat(t.miles), 0);
  const hmrcTotal = trips.filter(t=>t.type==='business').reduce((s,t) => s + parseFloat(t.hmrc_value||0), 0);
  const now = new Date(); const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const monthMiles = trips.filter(t => t.date.startsWith(thisMonth)).reduce((s,t) => s + parseFloat(t.miles), 0);
  document.getElementById('sTotalMiles').textContent = total.toFixed(1);
  document.getElementById('sTotalTrips').textContent = trips.length;
  document.getElementById('sHmrcVal').textContent = '£' + hmrcTotal.toFixed(2);
  document.getElementById('sThisMonth').textContent = monthMiles.toFixed(1) + ' mi';
}

async function addTrip() {
  const date = document.getElementById('tripDate').value;
  const from_address = document.getElementById('fromAddr').value.trim();
  const to_address = document.getElementById('toAddr').value.trim();
  const purpose = document.getElementById('tripPurpose').value.trim();
  const type = document.getElementById('tripType').value;
  const btn = document.getElementById('addBtn');
  const err = document.getElementById('tripErr');
  const calc = document.getElementById('calcMsg');

  err.textContent = '';
  if (!date || !from_address || !to_address) { err.textContent = '⚠ Please fill in date, from and to.'; return; }

  btn.disabled = true; calc.style.display = 'block';

  try {
    // Get distance first
    const distRes = await api(`/api/distance?origin=${encodeURIComponent(from_address)}&destination=${encodeURIComponent(to_address)}`);
    const miles = distRes.miles;

    // Save trip
    await api('/api/trips', 'POST', { date, from_address, to_address, miles, purpose, type });

    document.getElementById('fromAddr').value = '';
    document.getElementById('toAddr').value = '';
    document.getElementById('tripPurpose').value = '';
    document.getElementById('tripDate').value = today();

    await loadTrips();
    await loadSummary();
  } catch (e) {
    err.textContent = '⚠ ' + (e.message || 'Could not calculate route. Check addresses.');
  }

  btn.disabled = false; calc.style.display = 'none';
}

async function deleteTrip(id) {
  try {
    await api('/api/trips/' + id, 'DELETE');
    await loadTrips();
    await loadSummary();
  } catch (e) { console.error(e); }
}

// ---- FILTERS ----
function quickFilter(type, el) {
  document.querySelectorAll('.qf-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  const custom = document.getElementById('customDateRange');

  const now = new Date();
  if (type === 'all') {
    activeFilter = { from: null, to: null };
    custom.style.display = 'none';
  } else if (type === 'thismonth') {
    const y = now.getFullYear(), m = String(now.getMonth()+1).padStart(2,'0');
    activeFilter = { from: `${y}-${m}-01`, to: `${y}-${m}-31` };
    custom.style.display = 'none';
  } else if (type === 'lastmonth') {
    const d = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0');
    activeFilter = { from: `${y}-${m}-01`, to: `${y}-${m}-31` };
    custom.style.display = 'none';
  } else if (type === 'thisyear') {
    activeFilter = { from: `${now.getFullYear()}-01-01`, to: `${now.getFullYear()}-12-31` };
    custom.style.display = 'none';
  } else if (type === 'custom') {
    custom.style.display = 'block';
    return;
  }
  loadTrips();
}

function applyFilter() {
  activeFilter = {
    from: document.getElementById('filterFrom').value || null,
    to: document.getElementById('filterTo').value || null
  };
  loadTrips();
}

// ---- SUMMARY ----
async function loadSummary() {
  try {
    const data = await api('/api/trips/summary');
    const list = document.getElementById('summaryList');
    if (!data.length) {
      list.innerHTML = `<div class="empty-state"><div class="icon">📊</div><p>No trip data yet.</p></div>`;
      return;
    }
    list.innerHTML = data.map(m => `
      <div class="month-card">
        <div class="month-header">
          <div class="month-name">${m.month_label}</div>
          <div class="month-trips">${m.trip_count} trip${m.trip_count==1?'':'s'}</div>
        </div>
        <div class="month-stats">
          <div>
            <div class="month-stat-label">Total Miles</div>
            <div class="month-stat-value">${parseFloat(m.total_miles).toFixed(1)}</div>
          </div>
          <div>
            <div class="month-stat-label">Business</div>
            <div class="month-stat-value">${parseFloat(m.business_miles||0).toFixed(1)}</div>
          </div>
          <div>
            <div class="month-stat-label">${hmrcEnabled ? 'HMRC Value' : 'Personal'}</div>
            <div class="month-stat-value green">${hmrcEnabled ? '£'+parseFloat(m.hmrc_total||0).toFixed(2) : parseFloat(m.personal_miles||0).toFixed(1)}</div>
          </div>
        </div>
      </div>
    `).join('');
  } catch (e) { console.error(e); }
}

// ---- EXPORT ----
function exportCSV() {
  if (!allTrips.length) return;
  const headers = ['Date','From','To','Miles','Type','Purpose',...(hmrcEnabled?['HMRC Value (£)']:[])];
  const rows = allTrips.map(t => [
    t.date, `"${t.from_address}"`, `"${t.to_address}"`,
    parseFloat(t.miles).toFixed(1), t.type, `"${t.purpose||''}"`,
    ...(hmrcEnabled ? [parseFloat(t.hmrc_value||0).toFixed(2)] : [])
  ]);
  const csv = [headers.join(','), ...rows.map(r=>r.join(','))].join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = `milelog-export-${today()}.csv`;
  a.click();
}

// ---- API HELPER ----
async function api(url, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ---- UTILS ----
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  return new Date(d + 'T00:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}
